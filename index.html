<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05080b" />
    <title>EcoSentinel</title>
    <meta http-equiv="refresh" content="2; url=public/index.html" />
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #05080b;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
        overflow: hidden;
      }

      .loader-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
      }

      .shield {
        width: 64px;
        height: 64px;
        color: #2f8f86;
        animation: pulse 1.6s ease-in-out infinite;
      }

      .shield svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .shield .check {
        stroke-dasharray: 20;
        stroke-dashoffset: 20;
        animation: draw 1.6s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(47,143,134,0)); }
        50% { transform: scale(1.08); filter: drop-shadow(0 0 14px rgba(47,143,134,0.55)); }
      }

      @keyframes draw {
        0%, 30% { stroke-dashoffset: 20; }
        60%, 100% { stroke-dashoffset: 0; }
      }

      .brand {
        font-family: "Space Grotesk", -apple-system, sans-serif;
        font-weight: 600;
        font-size: 1.15rem;
        letter-spacing: 0.14em;
        color: #e4eaef;
      }

      .brand span {
        color: #6fbdb0;
      }

      .bar-track {
        width: 180px;
        height: 3px;
        border-radius: 3px;
        background: rgba(230, 238, 244, 0.1);
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 3px;
        background: linear-gradient(90deg, #2f8f86, #6fbdb0);
        animation: fill 1.8s ease-out forwards;
      }

      @keyframes fill {
        to { width: 100%; }
      }

      .status {
        font-size: 0.78rem;
        color: #8b99a6;
        letter-spacing: 0.03em;
      }

      noscript p {
        color: #8b99a6;
        font-size: 0.85rem;
      }
      noscript a {
        color: #6fbdb0;
      }
    </style>
  </head>
  <body>
    <div class="loader-wrap">
      <div class="shield" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5l-8-3Z" />
          <path class="check" d="m9 12 2 2 4-4" stroke="#6fbdb0" />
        </svg>
      </div>
      <div class="brand">ECO<span>SENTINEL</span></div>
      <div class="bar-track"><div class="bar-fill"></div></div>
      <div class="status">Conectando Dispositivo....</div>
    </div>

    <noscript>
      <p>Redirigiendo a <a href="public/index.html">EcoSentinel</a>…</p>
    </noscript>

    <script>
      setTimeout(function () {
        window.location.replace("public/index.html");
      }, 10000);
    </script>
  </body>
</html>
